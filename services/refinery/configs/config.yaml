regexes:
    - type: EMAIL
      pattern: '(?i)[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}'
    - type: URL
      pattern: '(?i)https?://[^\s"<>\{\}\[\]\\]+|\bwww\.[a-zA-Z0-9\-]+\.[a-zA-Z]{2,}[^\s"<>\{\}\[\]\\]*'
    - type: SSN
      pattern: '\b\d{3}-\d{2}-\d{4}\b'
    - type: CREDENTIAL
      pattern: '(?i)\bpassword\s*[:=]\s*[^\s,]+'
    - type: SECRET
      pattern: '(?i)\b(?:secret|key|token)\s*[:=]\s*[^\s,]+'
    - type: CREDIT_CARD
      pattern: '\b(?:4[0-9]{12}(?:[0-9]{3})?|5[1-5][0-9]{14}|6(?:011|5[0-9][0-9])[0-9]{12}|3[47][0-9]{13}|3(?:0[0-5]|[68][0-9])[0-9]{11}|(?:2131|1800|35\d{3})\d{11})\b'
    - type: PATIENT_ID
      pattern: '\b[A-Z]{2,3}[0-9]{6,10}\b'
    - type: MEDICAL_RECORD
      pattern: '\bMRN[- ]?[0-9]{7,10}\b'
dictionaries:
    - type: PERSON
      terms:
        - John Doe
        - Jane Smith
slm_confidence: 0.6
vault_backend: duckdb
postgres_dsn: ""
domain_snapshot: standard
crm_endpoint: ""
crm_api_key: ""
sync_interval: 5m
show_debug_metadata: false
max_concurrency: 10
queue_size: 5
rehydrate_fallback_enabled: false
inference_timeout: 5s
max_payload_size: 5242880
prometheus_enabled: true
