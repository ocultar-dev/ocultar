linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - gosec

linters-settings:
  gosec:
    excludes:
      - G304   # file path from variable — expected in vault/config code

issues:
  exclude-dirs:
    - apps/slm-engine
  exclude-use-default: false
  exclude-rules:
    - text: 'G104'
      linters:
        - gosec
    - text: 'SA4011'
      linters:
        - staticcheck
    - text: 'Close\(\)|Flush\(\)|os\.Remove|os\.(Un)?Setenv|fmt\.Fprint'
      linters:
        - errcheck
    - path: '_test\.go'
      linters:
        - errcheck
    - text: 'Encoder\)\.Encode`'
      linters:
        - errcheck
    - text: '`w\.Write`'
      linters:
        - errcheck
