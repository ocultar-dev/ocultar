linters:
  enable:
    - gosec
  settings:
    gosec:
      excludes:
        - G304
  exclusions:
    generated: lax
    rules:
      - linters:
          - gosec
        text: G104|G114|G301
      - linters:
          - staticcheck
        text: SA4011
      - linters:
          - errcheck
        text: .*\.Close.*is not checked
      - linters:
          - errcheck
        text: .*\.Log.*is not checked
      - linters:
          - errcheck
        text: .*\.Scan.*is not checked
      - linters:
          - errcheck
        text: rand\.Read.*is not checked
      - linters:
          - errcheck
        text: .*\.Write.*is not checked
      - linters:
          - errcheck
        text: .*\.Encode.*is not checked
      - linters:
          - errcheck
        text: fmt\.Fprint.*is not checked
      - linters:
          - errcheck
        path: _test\.go
    paths:
      - apps/slm-engine
      - third_party$
      - builtin$
      - examples$
formatters:
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
