# SOMBRA Agentic Data Gateway — Compose Stack
#
# This compose file brings up the SOMBRA Gateway and the isolated SLM NER engine.
# It mounts the local configs/sombra.yaml and creates a persistent volume for the vault.

services:
  # ── Init Container: Download the GGUF model ────────────────────────────
  init-slm:
    image: curlimages/curl:latest
    user: root
    container_name: sombra-init-slm
    volumes:
      - slm_data:/models
    command: >
      sh -c '
        echo "[*] Initializing Local SLM for SOMBRA..."
        if [ ! -f /models/qwen1_5-1_8b-chat-q4_k_m.gguf ] || [ $(wc -c < /models/qwen1_5-1_8b-chat-q4_k_m.gguf) -lt 1000000000 ]; then
          echo "[*] Downloading Qwen 1.5B Q4_K_M GGUF model..."
          curl -L -o /models/qwen1_5-1_8b-chat-q4_k_m.gguf --retry 5 --retry-delay 5 "https://huggingface.co/Qwen/Qwen1.5-1.8B-Chat-GGUF/resolve/main/qwen1_5-1_8b-chat-q4_k_m.gguf"
          echo "[+] Download complete!"
        else
          echo "[+] Model already exists and size looks correct, skipping download."
        fi
      '

  # ── Local SLM NER Engine (llama.cpp) ───────────────────────────────────
  slm-ner:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: sombra-slm
    restart: unless-stopped
    volumes:
      - slm_data:/models
    depends_on:
      init-slm:
        condition: service_completed_successfully
    command: >
      -m /models/qwen1_5-1_8b-chat-q4_k_m.gguf -c 4096 --host 0.0.0.0 --port 8080 -np 4
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── SOMBRA Gateway ───────────────────────────────────────────────────
  gateway:
    build:
      context: ../..  # Build context is the project root to include all modules
      dockerfile: apps/sombra/Dockerfile
    image: sombra-gateway:latest
    container_name: sombra-gateway
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      - OCU_MASTER_KEY=${OCU_MASTER_KEY:-default-dev-key-32-chars-long-!!!}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - BANK_API_KEY=${BANK_API_KEY:-}
      - SLACK_TOKEN=${SLACK_TOKEN:-}
      - SLACK_WORKSPACE_ID=${SLACK_WORKSPACE_ID:-}
    volumes:
      - ./configs/sombra.yaml:/app/configs/sombra.yaml:ro,Z
      - ./test.csv:/app/test.csv:ro,Z
      - sombra_vault:/app/vault_data
    depends_on:
      slm-ner:
        condition: service_healthy

volumes:
  sombra_vault:
    driver: local
  slm_data:
    driver: local
