name: Test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: go test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7.0.0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.work

      - name: Install C compiler
        run: sudo apt-get install -y gcc

      - name: Run test suite
        run: make test
        env:
          CGO_ENABLED: "1"
