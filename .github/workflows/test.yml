name: Test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: go test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7.0.0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.work

      - name: Install C compiler
        run: sudo apt-get install -y gcc

      - name: Run test suite
        run: make test
        env:
          CGO_ENABLED: "1"
