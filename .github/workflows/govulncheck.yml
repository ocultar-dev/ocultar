name: Vulnerability Scan

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.work

      - name: Drop private modules from workspace
        run: go work edit -dropuse ./apps/slm-engine

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: |
          for module in apps/proxy apps/sombra internal/pii pkg/gateway services/refinery services/vault; do
            echo "=== $module ==="
            govulncheck -C "$module" ./... || exit 1
          done
