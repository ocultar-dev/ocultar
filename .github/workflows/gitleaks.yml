name: Secret Scan (gitleaks)

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          set -euo pipefail
          version=8.28.0
          archive="gitleaks_${version}_linux_x64.tar.gz"
          curl -sSfLO "https://github.com/gitleaks/gitleaks/releases/download/v${version}/${archive}"
          curl -sSfLO "https://github.com/gitleaks/gitleaks/releases/download/v${version}/gitleaks_${version}_checksums.txt"
          grep " ${archive}\$" "gitleaks_${version}_checksums.txt" | sha256sum -c -
          tar -xzf "${archive}" gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks

      - name: Run gitleaks
        run: gitleaks detect --config .gitleaks.toml --source . --exit-code 1 --log-level warn
