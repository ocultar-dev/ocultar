version: 2

updates:
  # Go workspace modules
  - package-ecosystem: gomod
    directory: /services/refinery
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels: ["dependencies", "go"]

  - package-ecosystem: gomod
    directory: /internal/pii
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels: ["dependencies", "go"]

  - package-ecosystem: gomod
    directory: /services/vault
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels: ["dependencies", "go"]

  - package-ecosystem: gomod
    directory: /apps/sombra
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels: ["dependencies", "go"]

  - package-ecosystem: gomod
    directory: /apps/proxy
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels: ["dependencies", "go"]

  - package-ecosystem: gomod
    directory: /pkg/gateway
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels: ["dependencies", "go"]

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels: ["dependencies", "github-actions"]

  # Python MCP extensions
  - package-ecosystem: pip
    directory: /extensions/claude
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    labels: ["dependencies", "python"]

  - package-ecosystem: pip
    directory: /extensions/goose
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    labels: ["dependencies", "python"]
